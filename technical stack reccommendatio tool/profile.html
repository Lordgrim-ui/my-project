<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TechStack Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-layer-group"></i>
                    <span>TechStack Pro</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Tech Stacks</span>
                </a>
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-comments"></i>
                    <span>Comments</span>
                </a>
                <a href="#" class="nav-item active">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-outline" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <button class="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Profile Settings</h1>
                </div>
                <div class="header-right">
                    <div class="user-welcome">
                        <span>Welcome back, <strong id="userDisplayName">User</strong>!</span>
                    </div>
                    <div class="user-avatar">
                        <img id="userAvatar" src="/placeholder.svg?height=40&width=40" alt="User Avatar">
                    </div>
                </div>
            </header>

            <!-- Profile Content -->
            <div class="dashboard-content">
                <div class="profile-container">
                    <!-- Profile Picture Section -->
                    <div class="profile-card">
                        <div class="profile-header">
                            <h2>Profile Picture</h2>
                        </div>
                        <div class="profile-picture-section">
                            <div class="current-avatar">
                                <img id="profileAvatar" src="/placeholder.svg?height=120&width=120" alt="Profile Picture">
                                <div class="avatar-overlay">
                                    <i class="fas fa-camera"></i>
                                </div>
                            </div>
                            <div class="avatar-actions">
                                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                                <button class="btn btn-primary" onclick="document.getElementById('avatarInput').click()">
                                    <i class="fas fa-upload"></i>
                                    Upload New Picture
                                </button>
                                <button class="btn btn-outline" onclick="removeAvatar()">
                                    <i class="fas fa-trash"></i>
                                    Remove Picture
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Personal Information -->
                    <div class="profile-card">
                        <div class="profile-header">
                            <h2>Personal Information</h2>
                        </div>
                        <form id="profileForm" class="profile-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="profileFullName">Full Name</label>
                                    <input type="text" id="profileFullName" name="fullName" required>
                                </div>
                                <div class="form-group">
                                    <label for="profileUsername">Username</label>
                                    <input type="text" id="profileUsername" name="username" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="profileEmail">Email Address</label>
                                    <input type="email" id="profileEmail" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="profilePhone">Phone Number</label>
                                    <input type="tel" id="profilePhone" name="phone">
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="profileRole">Role</label>
                                    <select id="profileRole" name="role" required>
                                        <option value="developer">Developer</option>
                                        <option value="project-manager">Project Manager</option>
                                        <option value="tech-lead">Tech Lead</option>
                                        <option value="cto">CTO</option>
                                        <option value="student">Student</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="profileExperience">Experience Level</label>
                                    <select id="profileExperience" name="experience" required>
                                        <option value="beginner">Beginner (0-2 years)</option>
                                        <option value="intermediate">Intermediate (2-5 years)</option>
                                        <option value="advanced">Advanced (5-10 years)</option>
                                        <option value="expert">Expert (10+ years)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="profileBio">Bio</label>
                                <textarea id="profileBio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                Save Changes
                            </button>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="profile-card">
                        <div class="profile-header">
                            <h2>Change Password</h2>
                        </div>
                        <form id="passwordForm" class="profile-form">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <div class="input-group">
                                    <input type="password" id="currentPassword" name="currentPassword" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword('currentPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <div class="input-group">
                                    <input type="password" id="newPassword" name="newPassword" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="password-strength">
                                    <div class="strength-bar">
                                        <div class="strength-fill"></div>
                                    </div>
                                    <span class="strength-text">Password strength</span>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmNewPassword">Confirm New Password</label>
                                <div class="input-group">
                                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" required>
                                    <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-key"></i>
                                Update Password
                            </button>
                        </form>
                    </div>

                    <!-- Account Statistics -->
                    <div class="profile-card">
                        <div class="profile-header">
                            <h2>Account Statistics</h2>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <i class="fas fa-magic"></i>
                                </div>
                                <div class="stat-info">
                                    <h3 id="totalRecommendations">0</h3>
                                    <p>Recommendations Generated</p>
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <i class="fas fa-comments"></i>
                                </div>
                                <div class="stat-info">
                                    <h3 id="totalComments">0</h3>
                                    <p>Comments Posted</p>
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <i class="fas fa-calendar"></i>
                                </div>
                                <div class="stat-info">
                                    <h3 id="memberSince">-</h3>
                                    <p>Member Since</p>
                                </div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-icon">
                                    <i class="fas fa-download"></i>
                                </div>
                                <div class="stat-info">
                                    <h3 id="totalDownloads">0</h3>
                                    <p>Videos Downloaded</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="profile.js"></script>
</body>
</html>
